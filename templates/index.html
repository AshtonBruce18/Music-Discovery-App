<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Discovery</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
    <div class="container">
        <h1>Music Discovery</h1>
        <p>
            Music discovery made simple. By entering a genre, a less popular Spotify artist
            will be randomly generated for you to explore.
        </p>
        <form action="#" method="post" id="genre-form">
            <label for="genre">Enter a genre: </label>
            <input type="text" name="genre" id="genre" />
            <input type="submit" class="button"/>
        </form>
    </div>
    
</body>
</html>
